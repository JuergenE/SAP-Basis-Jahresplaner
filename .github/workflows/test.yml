name: Automated Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Backend Integration Tests (Jest + Supertest)
  # ─────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend API Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest backend tests
        run: npm run test:api
        env:
          NODE_ENV: test
          DB_PATH: ':memory:'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-results
          path: jest-results.json
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 2: E2E Browser Tests (Playwright)
  # ─────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Browser Tests (Playwright)
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          TEST_USER: ${{ secrets.TEST_USER || 'admin' }}
          TEST_PASS: ${{ secrets.TEST_PASS || 'admin123' }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
