<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAP Basis Jahresplaner 0.2.0</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin
    src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ===== Original Styles ===== */
    .weekend-pattern {
      background: repeating-linear-gradient(45deg,
          transparent,
          transparent 3px,
          rgba(156, 163, 175, 0.3) 3px,
          rgba(156, 163, 175, 0.3) 6px);
    }

    .holiday-pattern {
      background: repeating-linear-gradient(-45deg,
          transparent,
          transparent 3px,
          rgba(239, 68, 68, 0.2) 3px,
          rgba(239, 68, 68, 0.2) 6px);
    }

    .maintenance-pattern {
      background: repeating-linear-gradient(45deg,
          transparent,
          transparent 3px,
          rgba(139, 92, 246, 0.35) 3px,
          rgba(139, 92, 246, 0.35) 6px);
    }

    .today-marker {
      box-shadow: inset 0 0 0 2px #ef4444;
    }

    .activity-bar {
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .activity-bar:hover {
      transform: scaleY(1.1);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      z-index: 10;
    }

    @media (max-width: 640px) {
      .gantt-row-label {
        min-width: 100px !important;
        font-size: 0.75rem;
      }

      .header-controls {
        flex-direction: column;
        gap: 0.5rem;
      }
    }

    /* Header - Modern Glassmorphism */
    .app-header {
      background: rgba(17, 24, 39, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .header-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      letter-spacing: -0.025em;
    }

    .header-title i {
      color: #3b82f6;
      /* SAP Blue element */
    }

    .header-version {
      font-size: 0.75rem;
      font-weight: 500;
      color: #9ca3af;
      background: rgba(156, 163, 175, 0.1);
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      margin-left: 0.75rem;
      vertical-align: middle;
      border: 1px solid rgba(156, 163, 175, 0.2);
    }

    /* ===== Dark Mode Toggle Switch ===== */
    .dark-toggle {
      position: relative;
      width: 56px;
      height: 28px;
      border-radius: 14px;
      background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
      cursor: pointer;
      border: none;
      padding: 0;
      transition: background 0.4s ease;
      flex-shrink: 0;
    }

    .dark-toggle::after {
      content: '☀️';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: transform 0.4s cubic-bezier(.68, -0.55, .27, 1.55), background 0.4s ease;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
    }

    .dark-mode .dark-toggle {
      background: linear-gradient(135deg, #6272a4, #44475a);
    }

    .dark-mode .dark-toggle::after {
      content: '🌙';
      transform: translateX(28px);
      background: #282a36;
    }

    /* ===== Dark Mode — Dracula Palette Overrides ===== */
    /* Transition for smooth theme switching */
    html.dark-mode-transition,
    html.dark-mode-transition *,
    html.dark-mode-transition *::before,
    html.dark-mode-transition *::after {
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease !important;
    }

    /* Page background */
    .dark-mode body {
      background: #282a36 !important;
      color: #f8f8f2 !important;
    }

    .dark-mode .bg-gradient-to-br {
      background: #282a36 !important;
    }

    .dark-mode .from-slate-50 {
      --tw-gradient-from: #282a36 !important;
    }

    .dark-mode .to-slate-100 {
      --tw-gradient-to: #282a36 !important;
    }

    /* Cards and containers */
    .dark-mode .bg-white {
      background-color: #44475a !important;
    }

    .dark-mode .bg-gray-50 {
      background-color: #383a4a !important;
    }

    .dark-mode .bg-gray-100 {
      background-color: #383a4a !important;
    }

    .dark-mode .bg-gray-200 {
      background-color: #4a4d5e !important;
    }

    .dark-mode .hover\:bg-gray-50:hover {
      background-color: #4a4d5e !important;
    }

    .dark-mode .hover\:bg-gray-100:hover {
      background-color: #4a4d5e !important;
    }

    .dark-mode .hover\:bg-gray-300:hover {
      background-color: #555869 !important;
    }

    /* Text colors — catch-all: set default on root so everything inherits */
    .dark-mode {
      color-scheme: dark;
      color: #f8f8f2 !important;
    }

    /* Override Chrome Time Picker Colors */
    .dark-mode input[type="time"]::-webkit-datetime-edit-hour-field:focus,
    .dark-mode input[type="time"]::-webkit-datetime-edit-minute-field:focus {
      background-color: #a855f7 !important;
      color: white !important;
    }

    .dark-mode input[type="time"]::selection {
      background-color: #a855f7 !important;
      color: white !important;
    }

    ::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }

    .dark-mode .text-gray-900,
    .dark-mode .text-gray-800,
    .dark-mode .text-gray-700 {
      color: #f8f8f2 !important;
    }

    .dark-mode .text-black {
      color: #f8f8f2 !important;
    }

    .dark-mode p,
    .dark-mode td,
    .dark-mode th,
    .dark-mode li,
    .dark-mode div,
    .dark-mode span,
    .dark-mode label {
      color: #f8f8f2;
    }

    .dark-mode .text-gray-600 {
      color: #bfc4d6 !important;
    }

    .dark-mode .text-gray-500 {
      color: #9ca3c0 !important;
    }

    .dark-mode .text-gray-400 {
      color: #6272a4 !important;
    }

    .dark-mode .hover\\:text-gray-800:hover {
      color: #f8f8f2 !important;
    }

    .dark-mode .text-blue-700 {
      color: #bd93f9 !important;
    }

    .dark-mode .text-blue-600 {
      color: #bd93f9 !important;
    }

    .dark-mode .text-purple-700 {
      color: #d6acff !important;
    }

    .dark-mode .text-red-600 {
      color: #ff6e6e !important;
    }

    .dark-mode h1,
    .dark-mode h2,
    .dark-mode h3 {
      color: #f8f8f2 !important;
    }

    .dark-mode .font-semibold,
    .dark-mode .font-bold {
      color: #f8f8f2 !important;
    }

    .dark-mode .text-xs,
    .dark-mode .text-sm {
      color: inherit;
    }

    /* Borders */
    .dark-mode .border-gray-200,
    .dark-mode .border-gray-300 {
      border-color: #6272a4 !important;
    }

    .dark-mode .border-blue-300 {
      border-color: #6272a4 !important;
    }

    .dark-mode .border-blue-600 {
      border-color: #bd93f9 !important;
    }

    .dark-mode .border-t {
      border-color: #6272a4;
    }

    /* Dark mode: delete confirmation bar */
    .dark-mode .bg-red-50 {
      background-color: rgba(139, 0, 0, 0.2) !important;
    }

    .dark-mode .text-red-700 {
      color: #ff6e6e !important;
    }

    .dark-mode .border-red-200,
    .dark-mode .border-red-300 {
      border-color: #8b3a3a !important;
    }

    .dark-mode button {
      color: inherit;
    }

    /* Inputs and selects */
    .dark-mode input[type="text"],
    .dark-mode input[type="number"],
    .dark-mode input[type="password"],
    .dark-mode input[type="date"],
    .dark-mode input[type="time"],
    .dark-mode select,
    .dark-mode textarea {
      background-color: #383a4a !important;
      color: #f8f8f2 !important;
      border-color: #6272a4 !important;
    }

    /* Booked training green override - must beat dark-mode !important above */
    .booked-green,
    .dark-mode .booked-green,
    .dark-mode select.booked-green,
    .dark-mode input.booked-green,
    .dark-mode td.booked-green {
      background-color: #00b050 !important;
      color: #ffffff !important;
      border-color: #00b050 !important;
    }

    /* Dark mode: Role badge overrides for Benutzerverwaltung */
    .dark-mode .bg-amber-100 {
      background-color: #805b10 !important;
    }

    .dark-mode .text-amber-700 {
      color: #fde68a !important;
    }

    .dark-mode .bg-purple-100 {
      background-color: #5b21b6 !important;
    }

    .dark-mode .text-purple-700 {
      color: #e9d5ff !important;
    }

    .dark-mode .bg-sky-100 {
      background-color: #0c4a6e !important;
    }

    .dark-mode .text-sky-700 {
      color: #bae6fd !important;
    }

    .dark-mode .bg-gray-100.text-gray-600 {
      background-color: #4a4d5e !important;
      color: #d1d5db !important;
    }

    .dark-mode input::placeholder,
    .dark-mode textarea::placeholder {
      color: #6272a4 !important;
    }

    .dark-mode option {
      background-color: #383a4a;
      color: #f8f8f2;
    }

    /* Shadow adjustments */
    .dark-mode .shadow-lg {
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.3) !important;
    }

    .dark-mode .shadow-xl {
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.4) !important;
    }

    /* Modal overlay */
    .dark-mode .bg-black\/50,
    .dark-mode [class*="bg-black"] {
      background-color: rgba(0, 0, 0, 0.7) !important;
    }

    /* Patterns for dark mode */
    .dark-mode .weekend-pattern {
      background: repeating-linear-gradient(45deg,
          transparent,
          transparent 3px,
          rgba(98, 114, 164, 0.35) 3px,
          rgba(98, 114, 164, 0.35) 6px);
    }

    .dark-mode .holiday-pattern {
      background: repeating-linear-gradient(-45deg,
          transparent,
          transparent 3px,
          rgba(255, 85, 85, 0.25) 3px,
          rgba(255, 85, 85, 0.25) 6px);
    }

    .dark-mode .maintenance-pattern {
      background: repeating-linear-gradient(45deg,
          transparent,
          transparent 3px,
          rgba(189, 147, 249, 0.3) 3px,
          rgba(189, 147, 249, 0.3) 6px);
    }

    /* Buttons — keep colored buttons, darken gray ones */
    .dark-mode .bg-blue-100 {
      background-color: rgba(189, 147, 249, 0.2) !important;
    }

    .dark-mode .hover\:bg-blue-200:hover {
      background-color: rgba(189, 147, 249, 0.3) !important;
    }

    .dark-mode .bg-purple-50 {
      background-color: rgba(189, 147, 249, 0.15) !important;
    }

    .dark-mode .hover\:bg-purple-50:hover {
      background-color: rgba(189, 147, 249, 0.2) !important;
    }

    .dark-mode .bg-red-100 {
      background-color: rgba(255, 85, 85, 0.2) !important;
    }

    .dark-mode .hover\:bg-red-200:hover {
      background-color: rgba(255, 85, 85, 0.3) !important;
    }

    /* Gantt row label */
    .dark-mode .gantt-row-label {
      color: #f8f8f2;
    }

    /* Range slider */
    .dark-mode input[type="range"] {
      accent-color: #bd93f9;
    }

    /* Checkbox */
    .dark-mode input[type="checkbox"] {
      accent-color: #bd93f9;
    }

    /* Scrollbar for dark mode */
    .dark-mode ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .dark-mode ::-webkit-scrollbar-track {
      background: #282a36;
    }

    .dark-mode ::-webkit-scrollbar-thumb {
      background: #6272a4;
      border-radius: 4px;
    }

    .dark-mode ::-webkit-scrollbar-thumb:hover {
      background: #bd93f9;
    }

    /* Table for dark mode */
    .dark-mode table {
      color: #f8f8f2;
    }

    .dark-mode th {
      background-color: #383a4a !important;
      color: #f8f8f2 !important;
      border-color: #6272a4 !important;
    }

    .dark-mode td {
      border-color: #6272a4 !important;
    }

    .dark-mode tr:hover td {
      background-color: rgba(98, 114, 164, 0.15);
    }

    .dark-mode .bg-gray-600 {
      background-color: #555869 !important;
    }

    .dark-mode .bg-gray-100 {
      background-color: #383a4a !important;
    }

    .dark-mode .bg-gray-200 {
      background-color: #4a4d5e !important;
    }

    .dark-mode .hover\:bg-gray-700:hover {
      background-color: #4a4d5e !important;
    }

    /* CSV Export Dropdown dark mode */
    .dark-mode .csv-dropdown-panel {
      background-color: #383a4a !important;
      border-color: #6272a4 !important;
    }

    .dark-mode .csv-dropdown-panel button {
      color: #f8f8f2 !important;
    }

    .dark-mode .csv-dropdown-panel button:hover {
      background-color: rgba(80, 250, 123, 0.15) !important;
      color: #50fa7b !important;
    }

    .dark-mode .csv-dropdown-panel .border-t {
      border-color: #6272a4 !important;
    }

    /* Datensicherung Dropdown dark mode */
    .dark-mode .data-dropdown-panel {
      background-color: #383a4a !important;
      border-color: #6272a4 !important;
    }

    .dark-mode .data-dropdown-panel button {
      color: #f8f8f2 !important;
    }

    .dark-mode .data-dropdown-panel button:hover {
      background-color: rgba(98, 160, 234, 0.2) !important;
      color: #8be9fd !important;
    }

    .dark-mode .data-dropdown-panel .border-t {
      border-color: #6272a4 !important;
    }

    /* Matrix sticky column gap fixes using pseudo-elements (more reliable than box-shadow).
         Colors: light card=#fff, dark card=#44475a | light bg-gray-200=#e5e7eb, dark=#4a4d5e
                 light bg-gray-50=#f9fafb, dark=#383a4a | light bg-gray-100=#f3f4f6, dark=#383a4a */

    /* Percentage column: simple z-index stacking */
    .matrix-sticky-percentage-even {
      z-index: 21 !important;
    }

    .matrix-sticky-percentage-odd {
      z-index: 21 !important;
    }

    .matrix-sticky-percentage-footer {
      z-index: 21 !important;
    }

    /* Left name column: simple z-index stacking */
    .matrix-sticky-left-even {
      z-index: 21 !important;
    }

    .matrix-sticky-left-odd {
      z-index: 21 !important;
    }

    .matrix-sticky-left-footer {
      z-index: 21 !important;
    }

    /* Vertical header: pseudo-elements create opaque covers on both sides */
    .matrix-sticky-vertical-header {
      position: relative;
      z-index: 22 !important;
    }

    /* ::before = LEFT cover (seals gap between percentage column and vertical header) */
    .matrix-sticky-vertical-header::before {
      content: '';
      position: absolute;
      top: -1px;
      bottom: -1px;
      left: -10px;
      width: 10px;
      background-color: #e5e7eb;
      /* bg-gray-200 - matches own cell bg */
    }

    .dark-mode .matrix-sticky-vertical-header::before {
      background-color: #4a4d5e !important;
      /* dark bg-gray-200 */
    }

    /* Scroll container clips any right-edge sub-pixel gaps */
    .matrix-scroll-clip {
      overflow-x: auto;
      overflow-y: hidden;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <!-- Init dark mode from localStorage BEFORE React renders to prevent flash -->
  <script>
    (function () {
      try {
        if (localStorage.getItem('darkMode') === 'true') {
          document.documentElement.classList.add('dark-mode');
        }
      } catch (e) { }
    })();
  </script>

  <script src="/app.js"></script>
</body>

</html>
